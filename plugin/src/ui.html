<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma → Klaviyo</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 12px; color: #1e1b4b; background: #f5f3ff;
    }
    button { cursor: pointer; font-family: inherit; font-size: 12px; }
    input, select, textarea { font-family: inherit; font-size: 12px; }

    /* ── Layout ────────────────────────────────────────────── */
    .plugin-root { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ────────────────────────────────────────────── */
    .plugin-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }
    .plugin-title { font-weight: 700; font-size: 13px; color: #fff; letter-spacing: -0.2px; }
    .plugin-version {
      color: rgba(255,255,255,0.75); font-size: 10px;
      background: rgba(255,255,255,0.15); padding: 2px 7px; border-radius: 10px;
    }

    /* ── Mode Tabs ─────────────────────────────────────────── */
    .mode-tabs { display: flex; background: #fff; border-bottom: 1px solid #ede9fe; }
    .mode-tab {
      flex: 1; padding: 9px 12px; border: none; background: none;
      color: #6b7280; font-weight: 500; font-size: 12px;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .mode-tab.active { color: #7c3aed; border-bottom-color: #7c3aed; font-weight: 600; }
    .mode-tab:hover:not(.active) { color: #4f46e5; background: #faf5ff; }

    /* ── Content ───────────────────────────────────────────── */
    .plugin-content { flex: 1; overflow-y: auto; padding: 12px; background: #f5f3ff; }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; border: none; border-radius: 6px; padding: 8px 16px;
      font-weight: 600; font-size: 12px; letter-spacing: 0.1px;
      box-shadow: 0 2px 8px rgba(124,58,237,0.35); transition: all 0.15s;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #6d28d9, #4338ca); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(124,58,237,0.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: #fff; color: #374151; border: 1px solid #d1d5db;
      border-radius: 6px; padding: 7px 12px; font-weight: 500; transition: all 0.15s;
    }
    .btn-secondary:hover { background: #f9fafb; border-color: #a5b4fc; color: #4f46e5; }

    .btn-success {
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff; border: none; border-radius: 6px; padding: 8px 16px;
      font-weight: 600; font-size: 12px;
      box-shadow: 0 2px 8px rgba(5,150,105,0.35); transition: all 0.15s;
    }
    .btn-success:hover { background: linear-gradient(135deg, #047857, #059669); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(5,150,105,0.45); }

    .btn-stop {
      background: #fff0f0; color: #dc2626; border: 1px solid #fecaca;
      border-radius: 6px; padding: 6px 12px; font-weight: 600; margin-top: 8px; transition: all 0.15s;
    }
    .btn-stop:hover { background: #fee2e2; }
    .btn-stop-inline {
      background: none; color: #dc2626; border: 1px solid #fecaca;
      border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 600;
      margin-left: 8px; flex-shrink: 0; transition: all 0.1s;
    }
    .btn-stop-inline:hover { background: #fff0f0; }
    .btn-google {
      display: flex; align-items: center; gap: 8px; padding: 8px 16px;
      border: 1px solid #d1d5db; border-radius: 6px; background: #fff;
      color: #374151; font-weight: 600; transition: all 0.15s;
    }
    .btn-google:hover { background: #f9fafb; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-link { background: none; border: none; color: #7c3aed; text-decoration: underline; padding: 0; }

    /* ── Panels ────────────────────────────────────────────── */
    .step-panel { display: flex; flex-direction: column; gap: 10px; }
    .step-panel.loading {
      align-items: center; padding: 36px 16px;
      background: #fff; border-radius: 10px; border: 1px solid #ede9fe;
      box-shadow: 0 2px 12px rgba(124,58,237,0.08);
    }
    .step-panel.loading p { color: #6b7280; font-size: 12px; }
    .step-panel.success { align-items: center; padding: 20px; color: #059669; text-align: center; }
    .success-inline {
      color: #059669; font-weight: 600; margin: 0 0 8px;
      display: flex; align-items: center; gap: 6px;
      background: #ecfdf5; border: 1px solid #a7f3d0;
      padding: 8px 10px; border-radius: 6px;
    }
    .empty-state { text-align: center; padding: 40px 16px; color: #9ca3af; }
    .action-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

    /* ── Spinner ───────────────────────────────────────────── */
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #ede9fe; border-top-color: #7c3aed;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alerts ────────────────────────────────────────────── */
    .error-banner {
      background: #fef2f2; border: 1px solid #fecaca; border-left: 3px solid #ef4444;
      color: #dc2626; padding: 8px 10px; border-radius: 6px;
      display: flex; justify-content: space-between; align-items: flex-start; font-size: 11px;
    }
    .frame-warning { background: #fffbeb; border-bottom: 1px solid #fde68a; padding: 6px 12px; font-size: 11px; color: #92400e; }
    .warning-box {
      background: #fffbeb; border: 1px solid #fde68a; border-left: 3px solid #f59e0b;
      padding: 8px 10px; border-radius: 6px; font-size: 11px; color: #92400e;
    }

    /* ── Frame Info Card ───────────────────────────────────── */
    .frame-info {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: #fff; border-radius: 8px; border: 1px solid #ede9fe;
      box-shadow: 0 1px 4px rgba(124,58,237,0.07);
    }
    .frame-icon { font-size: 20px; }
    .frame-dims { color: #9ca3af; font-size: 11px; margin-left: 4px; }
    .design-summary {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
      background: #fff; border-radius: 8px; border: 1px solid #ede9fe;
      box-shadow: 0 1px 4px rgba(124,58,237,0.07);
    }
    .design-summary div { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: #6b7280; }
    .design-summary strong { font-size: 12px; color: #1e1b4b; }

    /* ── Figma Slices Notice ────────────────────────────────── */
    .figma-slices-notice {
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      border: 1px solid #c4b5fd; color: #5b21b6;
      padding: 7px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }

    /* ── Slice Preview ─────────────────────────────────────── */
    .slice-preview { display: flex; flex-direction: column; gap: 8px; }
    .preview-header { display: flex; justify-content: space-between; font-size: 11px; color: #6b7280; padding: 0 2px; }
    .preview-canvas { border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .slice-hint { font-size: 10px; color: #9ca3af; line-height: 1.4; margin-top: -2px; }
    .preview-actions { display: flex; gap: 6px; }
    .preview-actions button {
      flex: 1; padding: 6px; background: #fff; border: 1px solid #ede9fe;
      border-radius: 5px; color: #374151; transition: all 0.1s;
    }
    .preview-actions button:hover { background: #faf5ff; border-color: #c4b5fd; color: #7c3aed; }

    /* ── Compression Results ───────────────────────────────── */
    .compression-results { display: flex; flex-direction: column; gap: 8px; }
    .targets-box {
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      border: 1px solid #a5b4fc; padding: 8px 10px; border-radius: 6px;
      font-size: 11px; display: flex; flex-direction: column; gap: 2px; color: #3730a3;
    }
    .results-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .results-table th {
      background: #f5f3ff; padding: 6px 6px; text-align: left;
      border-bottom: 2px solid #ede9fe; color: #374151; font-weight: 600;
    }
    .results-table td { padding: 4px 6px; border-bottom: 1px solid #f5f3ff; }
    .results-table .totals-row { font-weight: 700; background: #f5f3ff; }
    .results-table .status-optimal td:last-child { color: #059669; font-weight: 600; }
    .results-table .status-good td:last-child { color: #10b981; font-weight: 600; }
    .results-table .status-warning td:last-child { color: #d97706; font-weight: 600; }
    .results-table .status-failed td:last-child { color: #dc2626; font-weight: 600; }
    .recommendation {
      background: #fffbeb; border: 1px solid #fde68a;
      padding: 6px 8px; border-radius: 6px; font-size: 11px; color: #92400e;
    }

    /* ── Compress Settings Card ────────────────────────────── */
    .compress-settings {
      background: #fff; border: 1px solid #ede9fe; border-radius: 8px;
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    .format-row { display: flex; flex-direction: column; gap: 6px; }
    .settings-label { font-size: 11px; color: #374151; font-weight: 600; }
    .format-options { display: flex; gap: 4px; flex-wrap: wrap; }
    .format-btn {
      padding: 4px 11px; border-radius: 20px; border: 1px solid #d1d5db;
      background: #f9fafb; font-size: 11px; color: #374151; transition: all 0.1s;
    }
    .format-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; font-weight: 600; }
    .format-btn:hover:not(.active) { background: #faf5ff; border-color: #a5b4fc; color: #4f46e5; }
    .format-warning { color: #d97706; font-size: 10px; }
    .format-note { color: #6b7280; font-size: 10px; }
    .slider-row { display: flex; flex-direction: column; gap: 4px; }
    .slider-row label { font-size: 11px; color: #374151; font-weight: 600; display: flex; justify-content: space-between; }
    .slider-row label span { color: #7c3aed; font-weight: 700; }
    .slider-row input[type=range] { width: 100%; accent-color: #7c3aed; cursor: pointer; }
    .slider-hints { display: flex; justify-content: space-between; font-size: 10px; color: #9ca3af; margin-top: -2px; }

    /* ── Tech Mode ─────────────────────────────────────────── */
    .login-panel { align-items: center; text-align: center; padding: 32px 16px; gap: 14px; }
    .login-icon { font-size: 40px; margin-bottom: 4px; }
    .user-bar {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: #fff; border: 1px solid #ede9fe; border-radius: 8px;
      font-size: 11px; box-shadow: 0 1px 4px rgba(124,58,237,0.07);
    }
    .user-bar span { flex: 1; }
    .section-title {
      font-weight: 700; font-size: 10px; color: #a78bfa;
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 4px; padding: 0 2px;
    }
    .multi-frame-note {
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      border: 1px solid #a5b4fc; color: #3730a3;
      padding: 7px 10px; border-radius: 6px;
      font-size: 11px;
    }

    /* ── Slice Config Table ────────────────────────────────── */
    .slice-config-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .slice-config-table th {
      background: #f5f3ff; padding: 6px 4px; text-align: left;
      border-bottom: 2px solid #ede9fe; color: #374151; font-weight: 600;
    }
    .slice-config-table td { padding: 3px 4px; border-bottom: 1px solid #f5f3ff; vertical-align: middle; }
    .slice-config-table input {
      width: 100%; border: 1px solid #ede9fe; border-radius: 4px;
      padding: 3px 5px; background: #faf5ff; transition: all 0.1s; color: #1e1b4b;
    }
    .slice-config-table input:focus { outline: none; border-color: #7c3aed; background: #fff; box-shadow: 0 0 0 2px rgba(124,58,237,0.1); }
    .frame-divider-row td {
      background: linear-gradient(90deg, #ede9fe, #f5f3ff);
      color: #5b21b6; font-weight: 700; font-size: 11px; padding: 6px 4px;
    }

    /* ── Klaviyo Config ────────────────────────────────────── */
    .klaviyo-config { display: flex; flex-direction: column; gap: 10px; }
    .mode-selector { display: flex; gap: 12px; font-size: 12px; }
    .mode-selector label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #374151; }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field label { font-size: 11px; color: #374151; font-weight: 600; }
    .form-field input, .form-field select {
      border: 1px solid #ede9fe; border-radius: 6px; padding: 6px 8px;
      background: #faf5ff; transition: all 0.15s; color: #1e1b4b;
    }
    .form-field input:focus, .form-field select:focus {
      outline: none; border-color: #7c3aed; background: #fff;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }

    /* ── API Key Setup ─────────────────────────────────────── */
    .key-setup-header { text-align: center; padding: 8px 0 4px; }
    .key-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .key-setup-header p { color: #6b7280; font-size: 12px; line-height: 1.5; }
    .key-hint { font-size: 11px; color: #9ca3af; margin-top: -2px; }
    .field-error { color: #dc2626; font-size: 11px; margin-top: 2px; }
    .identity-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: #fff; border: 1px solid #ede9fe;
      border-radius: 8px; font-size: 11px; box-shadow: 0 1px 4px rgba(124,58,237,0.07);
    }
    .key-indicator { display: flex; align-items: center; gap: 6px; }
    .key-masked { color: #9ca3af; font-family: monospace; font-size: 11px; }

    /* ── Frame Picker (Tech Mode) ──────────────────────────── */
    .frame-picker { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 0 8px; border-bottom: 1px solid #ede9fe; margin-bottom: 8px; }
    .frame-pill {
      padding: 4px 10px; border-radius: 20px; border: 1px solid #ede9fe;
      background: #fff; color: #374151; font-size: 11px;
      max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: all 0.1s; cursor: pointer;
    }
    .frame-pill:hover { border-color: #a5b4fc; color: #4f46e5; }
    .frame-pill.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .frame-pill.done { border-color: #10b981; color: #059669; }
    .frame-pill.active.done { background: #059669; border-color: #059669; color: #fff; }

    /* ── HTML Preview ──────────────────────────────────────── */
    .html-preview { border: 1px solid #ede9fe; border-radius: 8px; overflow: hidden; }
    .html-preview .preview-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: #f5f3ff; border-bottom: 1px solid #ede9fe;
      font-size: 11px; font-weight: 600; color: #374151;
    }

    /* ── Frame Checklist ───────────────────────────────────── */
    .frame-checklist { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .checklist-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #6b7280; padding: 4px 2px 8px; font-weight: 500;
    }
    .checklist-header button {
      font-size: 10px; padding: 2px 8px; background: #fff; border: 1px solid #ede9fe;
      border-radius: 10px; margin-left: 4px; color: #6b7280; transition: all 0.1s;
    }
    .checklist-header button:hover { background: #faf5ff; border-color: #c4b5fd; color: #7c3aed; }
    .frame-check-item {
      display: flex; align-items: center; gap: 7px; padding: 6px 8px;
      border-radius: 6px; cursor: pointer; font-size: 11px;
      border: 1px solid transparent; user-select: none; transition: all 0.1s;
      background: #fff;
    }
    .frame-check-item:hover { background: #faf5ff; border-color: #ede9fe; }
    .frame-check-item.checked { background: #faf5ff; border-color: #ddd6fe; }
    .frame-check-item.active-frame { outline: 2px solid #7c3aed; outline-offset: -1px; background: #f5f3ff; }
    .frame-check-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1e1b4b; font-weight: 500; }
    .frame-check-dims { color: #9ca3af; font-size: 10px; white-space: nowrap; }
    .frame-check-done { color: #059669; font-weight: 700; font-size: 12px; }
    .frame-check-badge {
      font-size: 9px; background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; padding: 2px 5px; border-radius: 10px; white-space: nowrap; font-weight: 600;
    }
    .frame-check-badge.figma-badge { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
    .frame-check-spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 2px solid #ede9fe; border-top-color: #7c3aed;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    /* ── Batch Progress Bars ───────────────────────────────── */
    .batch-progress {
      position: relative; background: #ede9fe; border-radius: 6px;
      height: 24px; overflow: hidden; margin-bottom: 6px; border: 1px solid #ddd6fe;
    }
    .batch-bar {
      position: absolute; left: 0; top: 0; height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      transition: width 0.3s ease;
    }
    .batch-progress span {
      position: relative; z-index: 1; font-size: 10px; color: #4c1d95;
      font-weight: 600; padding: 0 10px; line-height: 24px; display: flex;
      align-items: center; gap: 6px;
    }

    /* ── Push Results ──────────────────────────────────────── */
    .push-results-list { display: flex; flex-direction: column; gap: 8px; }
    .push-result-item {
      background: #fff; border: 1px solid #ede9fe; border-radius: 8px;
      padding: 10px 12px; border-left: 3px solid #10b981;
    }
    .result-frame-name { font-weight: 600; color: #1e1b4b; margin-bottom: 4px; font-size: 12px; }
    .result-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .result-links a {
      font-size: 11px; color: #7c3aed; text-decoration: none;
      padding: 3px 9px; background: #faf5ff; border: 1px solid #ddd6fe;
      border-radius: 10px; transition: all 0.1s;
    }
    .result-links a:hover { background: #ede9fe; border-color: #a78bfa; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="ui.js"></script>
</body>
</html>
