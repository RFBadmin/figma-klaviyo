<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma → Klaviyo</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #08070f;
      --surface:    #0e0c1b;
      --panel:      rgba(255,255,255,0.042);
      --border:     rgba(255,255,255,0.08);
      --border-hi:  rgba(255,255,255,0.13);
      --accent:     #274eb6;
      --accent-dk:  #1e3d96;
      --accent-lt:  #7fa3e8;
      --glow:       rgba(39,78,182,0.32);
      --t1:         #f0f4ff;
      --t2:         #94a8cc;
      --t3:         #556080;
      --green:      #34d399;
      --amber:      #fbbf24;
      --red:        #f87171;
      --r:          8px;
      --ease:       cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 12px;
      color: var(--t1);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    button  { cursor: pointer; font-family: inherit; font-size: 12px; }
    input, select, textarea { font-family: inherit; font-size: 12px; }

    /* ── Layout ────────────────────────────────────────────────────── */
    .plugin-root {
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
      background:
        radial-gradient(ellipse 80% 50% at 110% -10%, rgba(39,78,182,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at -10% 110%, rgba(30,61,150,0.16) 0%, transparent 60%),
        var(--bg);
    }

    /* ── Header ────────────────────────────────────────────────────── */
    .plugin-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: rgba(39,78,182,0.12);
      border-bottom: 1px solid rgba(39,78,182,0.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .plugin-title {
      font-weight: 800; font-size: 13px; color: var(--t1);
      letter-spacing: -0.3px; display: flex; align-items: center; gap: 6px;
    }
    .plugin-title::before {
      content: 'RFB';
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: #fff; font-size: 9px; font-weight: 900;
      padding: 2px 5px; border-radius: 5px;
      box-shadow: 0 0 10px var(--glow);
      letter-spacing: 0.2px;
    }
    .plugin-version {
      color: var(--accent-lt); font-size: 10px;
      background: rgba(39,78,182,0.14);
      border: 1px solid rgba(39,78,182,0.25);
      padding: 2px 7px; border-radius: 10px;
      font-weight: 500;
    }

    /* ── Mode Tabs ─────────────────────────────────────────────────── */
    .mode-tabs {
      display: flex;
      background: rgba(255,255,255,0.025);
      border-bottom: 1px solid var(--border);
    }
    .mode-tab {
      flex: 1; padding: 9px 12px; border: none; background: none;
      color: var(--t3); font-weight: 500; font-size: 12px;
      border-bottom: 2px solid transparent; transition: all 0.18s var(--ease);
      letter-spacing: 0.1px;
    }
    .mode-tab.active {
      color: var(--accent-lt); border-bottom-color: var(--accent);
      font-weight: 700; background: rgba(39,78,182,0.07);
    }
    .mode-tab:hover:not(.active) { color: var(--t2); background: rgba(255,255,255,0.04); }

    /* ── Content ───────────────────────────────────────────────────── */
    .plugin-content {
      flex: 1; overflow-y: auto; padding: 12px;
      background: transparent;
    }
    .plugin-content::-webkit-scrollbar { width: 4px; }
    .plugin-content::-webkit-scrollbar-track { background: transparent; }
    .plugin-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 100px; }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dk));
      color: #fff; border: none; border-radius: var(--r); padding: 8px 16px;
      font-weight: 700; font-size: 12px; letter-spacing: 0.1px;
      box-shadow: 0 0 18px var(--glow), 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 28px var(--glow), 0 4px 14px rgba(0,0,0,0.35);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      background: rgba(255,255,255,0.08); color: var(--t3);
      box-shadow: none; cursor: not-allowed; transform: none;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05); color: var(--t2);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 7px 12px; font-weight: 500;
      transition: all 0.18s var(--ease);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.09); color: var(--t1);
      border-color: var(--border-hi);
    }

    .btn-success {
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff; border: none; border-radius: var(--r); padding: 8px 16px;
      font-weight: 700; font-size: 12px;
      box-shadow: 0 0 18px rgba(16,185,129,0.28), 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }
    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(16,185,129,0.4), 0 4px 14px rgba(0,0,0,0.35);
    }

    .btn-stop {
      background: rgba(248,113,113,0.10); color: var(--red);
      border: 1px solid rgba(248,113,113,0.25); border-radius: var(--r);
      padding: 6px 12px; font-weight: 600; margin-top: 8px;
      transition: all 0.15s;
    }
    .btn-stop:hover { background: rgba(248,113,113,0.18); }
    .btn-stop-inline {
      background: none; color: var(--red);
      border: 1px solid rgba(248,113,113,0.3); border-radius: 4px;
      padding: 2px 7px; font-size: 11px; font-weight: 600;
      margin-left: 8px; flex-shrink: 0; transition: all 0.1s;
    }
    .btn-stop-inline:hover { background: rgba(248,113,113,0.1); }

    .btn-google {
      display: flex; align-items: center; gap: 8px; padding: 8px 16px;
      border: 1px solid var(--border); border-radius: var(--r);
      background: rgba(255,255,255,0.05); color: var(--t1); font-weight: 600;
      transition: all 0.15s;
    }
    .btn-google:hover { background: rgba(255,255,255,0.09); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .btn-link { background: none; border: none; color: var(--accent-lt); text-decoration: underline; padding: 0; }

    /* ── Panels ────────────────────────────────────────────────────── */
    .step-panel { display: flex; flex-direction: column; gap: 10px; }
    .step-panel.loading {
      align-items: center; padding: 36px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .step-panel.loading p { color: var(--t3); font-size: 12px; }
    .step-panel.success { align-items: center; padding: 20px; color: var(--green); text-align: center; }
    .success-inline {
      color: var(--green); font-weight: 600; margin: 0 0 8px;
      display: flex; align-items: center; gap: 6px;
      background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2);
      padding: 8px 10px; border-radius: var(--r);
    }
    .empty-state { text-align: center; padding: 40px 16px; color: var(--t3); }
    .action-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

    /* ── Spinner ───────────────────────────────────────────────────── */
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(39,78,182,0.2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alerts ────────────────────────────────────────────────────── */
    .error-banner {
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.22);
      border-left: 3px solid var(--red);
      color: var(--red); padding: 8px 10px; border-radius: var(--r);
      display: flex; justify-content: space-between; align-items: flex-start; font-size: 11px;
    }
    .frame-warning {
      background: rgba(251,191,36,0.07); border-bottom: 1px solid rgba(251,191,36,0.2);
      padding: 6px 12px; font-size: 11px; color: var(--amber);
    }
    .warning-box {
      background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2);
      border-left: 3px solid var(--amber);
      padding: 8px 10px; border-radius: var(--r); font-size: 11px; color: var(--amber);
    }

    /* ── Frame Info Card ───────────────────────────────────────────── */
    .frame-info {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--panel); border-radius: var(--r); border: 1px solid var(--border);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .frame-icon { font-size: 18px; }
    .frame-dims { color: var(--t3); font-size: 11px; margin-left: 4px; }
    .design-summary {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
      background: var(--panel); border-radius: var(--r); border: 1px solid var(--border);
    }
    .design-summary div { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: var(--t3); }
    .design-summary strong { font-size: 12px; color: var(--t1); }

    /* ── Figma Slices Notice ────────────────────────────────────────── */
    .figma-slices-notice {
      background: rgba(39,78,182,0.12);
      border: 1px solid rgba(39,78,182,0.28); color: var(--accent-lt);
      padding: 7px 10px; border-radius: var(--r);
      font-size: 11px; font-weight: 600;
    }

    /* ── Slice Preview ─────────────────────────────────────────────── */
    .slice-preview { display: flex; flex-direction: column; gap: 8px; }
    .preview-header { display: flex; justify-content: space-between; font-size: 11px; color: var(--t3); padding: 0 2px; }
    .preview-canvas { border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .slice-hint { font-size: 10px; color: var(--t3); line-height: 1.4; margin-top: -2px; }
    .preview-actions { display: flex; gap: 6px; }
    .preview-actions button {
      flex: 1; padding: 6px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 6px; color: var(--t2); transition: all 0.15s;
    }
    .preview-actions button:hover { background: rgba(39,78,182,0.12); border-color: rgba(39,78,182,0.3); color: var(--accent-lt); }

    /* ── Compression Results ─────────────────────────────────────────── */
    .compression-results { display: flex; flex-direction: column; gap: 8px; }
    .targets-box {
      background: rgba(39,78,182,0.10);
      border: 1px solid rgba(39,78,182,0.22); padding: 8px 10px; border-radius: var(--r);
      font-size: 11px; display: flex; flex-direction: column; gap: 2px; color: var(--accent-lt);
    }
    .results-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .results-table th {
      background: rgba(255,255,255,0.04); padding: 6px 6px; text-align: left;
      border-bottom: 1px solid var(--border); color: var(--t2); font-weight: 600;
    }
    .results-table td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--t1); }
    .results-table .totals-row { font-weight: 700; background: rgba(255,255,255,0.03); }
    .results-table .status-optimal td:last-child { color: var(--green); font-weight: 600; }
    .results-table .status-good    td:last-child { color: var(--green); font-weight: 600; }
    .results-table .status-warning td:last-child { color: var(--amber); font-weight: 600; }
    .results-table .status-failed  td:last-child { color: var(--red); font-weight: 600; }
    .recommendation {
      background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2);
      padding: 6px 8px; border-radius: var(--r); font-size: 11px; color: var(--amber);
    }

    /* ── Compress Settings Card ──────────────────────────────────────── */
    .compress-settings {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .format-row { display: flex; flex-direction: column; gap: 6px; }
    .settings-label { font-size: 11px; color: var(--t2); font-weight: 600; letter-spacing: 0.2px; }
    .format-options { display: flex; gap: 4px; flex-wrap: wrap; }
    .format-btn {
      padding: 4px 11px; border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04); font-size: 11px; color: var(--t3);
      transition: all 0.15s;
    }
    .format-btn.active {
      background: rgba(39,78,182,0.18); color: var(--accent-lt);
      border-color: rgba(39,78,182,0.4); font-weight: 600;
      box-shadow: 0 0 10px rgba(39,78,182,0.15);
    }
    .format-btn:hover:not(.active) { background: rgba(255,255,255,0.07); color: var(--t2); border-color: var(--border-hi); }
    .format-warning { color: var(--amber); font-size: 10px; }
    .format-note { color: var(--t3); font-size: 10px; }
    .slider-row { display: flex; flex-direction: column; gap: 4px; }
    .slider-row label {
      font-size: 11px; color: var(--t2); font-weight: 600;
      display: flex; justify-content: space-between;
    }
    .slider-row label span { color: var(--accent-lt); font-weight: 700; }
    .slider-row input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .slider-hints { display: flex; justify-content: space-between; font-size: 10px; color: var(--t3); margin-top: -2px; }

    /* ── Tech Mode ──────────────────────────────────────────────────── */
    .login-panel { align-items: center; text-align: center; padding: 32px 16px; gap: 14px; }
    .login-icon { font-size: 40px; margin-bottom: 4px; }
    .user-bar {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--r);
      font-size: 11px;
    }
    .user-bar span { flex: 1; color: var(--t2); }
    .section-title {
      font-weight: 700; font-size: 10px; color: var(--accent-lt);
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 4px; padding: 0 2px;
    }
    .multi-frame-note {
      background: rgba(39,78,182,0.10);
      border: 1px solid rgba(39,78,182,0.22); color: var(--accent-lt);
      padding: 7px 10px; border-radius: var(--r); font-size: 11px;
    }

    /* ── Slice Config Table ───────────────────────────────────────────── */
    .slice-config-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .slice-config-table th {
      background: rgba(255,255,255,0.04); padding: 6px 4px; text-align: left;
      border-bottom: 1px solid var(--border); color: var(--t2); font-weight: 600;
    }
    .slice-config-table td {
      padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle; color: var(--t1);
    }
    .slice-config-table input {
      width: 100%; border: 1px solid rgba(255,255,255,0.07); border-radius: 4px;
      padding: 3px 5px; background: rgba(255,255,255,0.04); color: var(--t1);
      transition: all 0.15s;
    }
    .slice-config-table input:focus {
      outline: none; border-color: rgba(39,78,182,0.5);
      background: rgba(39,78,182,0.08); box-shadow: 0 0 0 2px rgba(39,78,182,0.12);
    }
    .frame-divider-row td {
      background: rgba(39,78,182,0.10);
      color: var(--accent-lt); font-weight: 700; font-size: 11px; padding: 6px 4px;
    }

    /* ── Klaviyo Config ───────────────────────────────────────────────── */
    .klaviyo-config { display: flex; flex-direction: column; gap: 10px; }
    .mode-selector { display: flex; gap: 12px; font-size: 12px; }
    .mode-selector label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: var(--t2); }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field label { font-size: 11px; color: var(--t2); font-weight: 600; }
    .form-field input, .form-field select {
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--r); padding: 6px 8px;
      background: rgba(255,255,255,0.04); color: var(--t1); transition: all 0.15s;
    }
    .form-field input:focus, .form-field select:focus {
      outline: none; border-color: rgba(39,78,182,0.5);
      background: rgba(39,78,182,0.07); box-shadow: 0 0 0 3px rgba(39,78,182,0.12);
    }
    .form-field input::placeholder { color: var(--t3); }
    .form-field select option { background: #0e0c1b; color: var(--t1); }

    /* ── API Key Setup ────────────────────────────────────────────────── */
    .key-setup-header { text-align: center; padding: 8px 0 4px; }
    .key-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .key-setup-header p { color: var(--t3); font-size: 12px; line-height: 1.5; }
    .key-hint { font-size: 11px; color: var(--t3); margin-top: -2px; }
    .field-error { color: var(--red); font-size: 11px; margin-top: 2px; }
    .identity-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); font-size: 11px;
    }
    .key-indicator { display: flex; align-items: center; gap: 6px; color: var(--green); }
    .key-masked { color: var(--t3); font-family: monospace; font-size: 11px; }

    /* ── Frame Picker (Tech Mode) ─────────────────────────────────────── */
    .frame-picker {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 6px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .frame-pill {
      padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.04); color: var(--t2); font-size: 11px;
      max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: all 0.15s; cursor: pointer;
    }
    .frame-pill:hover { border-color: rgba(39,78,182,0.35); color: var(--accent-lt); }
    .frame-pill.active {
      background: rgba(39,78,182,0.18); color: var(--accent-lt);
      border-color: rgba(39,78,182,0.4); font-weight: 600;
    }
    .frame-pill.done { border-color: rgba(52,211,153,0.3); color: var(--green); }
    .frame-pill.active.done { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.4); color: var(--green); }

    /* ── HTML Preview ─────────────────────────────────────────────────── */
    .html-preview { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .html-preview .preview-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--t2);
    }

    /* ── Frame Checklist ──────────────────────────────────────────────── */
    .frame-checklist { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .checklist-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--t3); padding: 4px 2px 8px; font-weight: 500;
    }
    .checklist-header button {
      font-size: 10px; padding: 2px 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; margin-left: 4px; color: var(--t3); transition: all 0.1s;
    }
    .checklist-header button:hover { background: rgba(39,78,182,0.10); border-color: rgba(39,78,182,0.3); color: var(--accent-lt); }
    .frame-check-item {
      display: flex; align-items: center; gap: 7px; padding: 7px 9px;
      border-radius: var(--r); cursor: pointer; font-size: 11px;
      border: 1px solid transparent; user-select: none; transition: all 0.15s;
      background: rgba(255,255,255,0.025);
    }
    .frame-check-item:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
    .frame-check-item.checked { background: rgba(39,78,182,0.07); border-color: rgba(39,78,182,0.18); }
    .frame-check-item.active-frame {
      outline: 2px solid rgba(39,78,182,0.6); outline-offset: -1px;
      background: rgba(39,78,182,0.10);
    }
    .frame-check-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--t1); font-weight: 500; }
    .frame-check-dims { color: var(--t3); font-size: 10px; white-space: nowrap; }
    .frame-check-done { color: var(--green); font-weight: 700; font-size: 12px; }
    .frame-check-badge {
      font-size: 9px; background: rgba(52,211,153,0.14);
      border: 1px solid rgba(52,211,153,0.25);
      color: var(--green); padding: 2px 5px; border-radius: 10px; white-space: nowrap; font-weight: 600;
    }
    .frame-check-badge.figma-badge {
      background: rgba(39,78,182,0.14);
      border-color: rgba(39,78,182,0.28); color: var(--accent-lt);
    }
    .frame-check-spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 2px solid rgba(39,78,182,0.2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    /* ── Batch Progress Bars ──────────────────────────────────────────── */
    .batch-progress {
      position: relative; background: rgba(39,78,182,0.12); border-radius: var(--r);
      height: 24px; overflow: hidden; margin-bottom: 6px;
      border: 1px solid rgba(39,78,182,0.22);
    }
    .batch-bar {
      position: absolute; left: 0; top: 0; height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-lt));
      box-shadow: 0 0 12px var(--glow);
      transition: width 0.3s var(--ease);
    }
    .batch-progress span {
      position: relative; z-index: 1; font-size: 10px; color: var(--t1);
      font-weight: 600; padding: 0 10px; line-height: 24px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Push Results ─────────────────────────────────────────────────── */
    .push-results-list { display: flex; flex-direction: column; gap: 8px; }
    .push-result-item {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--r);
      padding: 10px 12px; border-left: 3px solid var(--green);
    }
    .result-frame-name { font-weight: 600; color: var(--t1); margin-bottom: 4px; font-size: 12px; }
    .result-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .result-links a {
      font-size: 11px; color: var(--accent-lt); text-decoration: none;
      padding: 3px 9px; background: rgba(39,78,182,0.10);
      border: 1px solid rgba(39,78,182,0.25); border-radius: 10px; transition: all 0.1s;
    }
    .result-links a:hover { background: rgba(39,78,182,0.18); border-color: rgba(39,78,182,0.4); }

    /* ── Designer Mode wrapper ──────────────────────────────────────── */
    .designer-mode { display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>

  <div id="root"></div>
  <script src="ui.js"></script>
</body>
