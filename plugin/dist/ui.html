<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma → Klaviyo</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; color: #1a1a1a; background: #fff; }
    button { cursor: pointer; font-family: inherit; font-size: 12px; }
    input, select, textarea { font-family: inherit; font-size: 12px; }

    /* ── Layout ──────────────────────────────────────────── */
    .plugin-root { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .plugin-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #e5e5e5; background: #f9f9f9; }
    .plugin-title { font-weight: 700; font-size: 13px; }
    .plugin-version { color: #999; font-size: 11px; }
    .plugin-content { flex: 1; overflow-y: auto; padding: 12px; }

    /* ── Mode Tabs ───────────────────────────────────────── */
    .mode-tabs { display: flex; border-bottom: 1px solid #e5e5e5; }
    .mode-tab { flex: 1; padding: 8px; border: none; background: none; color: #666; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .mode-tab.active { color: #0099ff; border-bottom-color: #0099ff; background: #f0f8ff; }
    .mode-tab:hover:not(.active) { background: #f5f5f5; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn-primary { background: #0099ff; color: #fff; border: none; border-radius: 4px; padding: 7px 14px; font-weight: 600; }
    .btn-primary:hover { background: #007acc; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ddd; border-radius: 4px; padding: 6px 12px; }
    .btn-secondary:hover { background: #e5e5e5; }
    .btn-stop { background: #fff0f0; color: #cc2200; border: 1px solid #ffcccc; border-radius: 4px; padding: 5px 12px; font-weight: 600; margin-top: 8px; }
    .btn-stop:hover { background: #ffe0e0; }
    .btn-stop-inline { background: none; color: #cc2200; border: 1px solid #ffcccc; border-radius: 3px; padding: 2px 7px; font-size: 11px; font-weight: 600; margin-left: 8px; flex-shrink: 0; }
    .btn-stop-inline:hover { background: #fff0f0; }
    .btn-google { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; background: #fff; color: #333; font-weight: 600; }
    .btn-google:hover { background: #f5f5f5; }
    .btn-link { background: none; border: none; color: #0099ff; text-decoration: underline; padding: 0; }

    /* ── Panels ──────────────────────────────────────────── */
    .step-panel { display: flex; flex-direction: column; gap: 10px; }
    .step-panel.loading { align-items: center; padding: 24px; }
    .step-panel.success { align-items: center; padding: 16px; color: #22a06b; text-align: center; }
    .success-inline { color: #22a06b; font-weight: 600; margin: 0 0 8px; }
    .empty-state { text-align: center; padding: 32px 16px; color: #666; }
    .action-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner { width: 24px; height: 24px; border: 3px solid #e5e5e5; border-top-color: #0099ff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alerts ──────────────────────────────────────────── */
    .error-banner { background: #fff0f0; border: 1px solid #ffb3b3; color: #cc0000; padding: 8px 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: flex-start; font-size: 11px; }
    .frame-warning { background: #fff8e0; border-bottom: 1px solid #ffe58f; padding: 6px 12px; font-size: 11px; color: #7d5a00; }
    .warning-box { background: #fff8e0; border: 1px solid #ffe58f; padding: 8px 10px; border-radius: 4px; font-size: 11px; color: #7d5a00; }

    /* ── Frame Info ──────────────────────────────────────── */
    .frame-info { display: flex; align-items: center; gap: 8px; padding: 8px; background: #f5f5f5; border-radius: 6px; }
    .frame-icon { font-size: 18px; }
    .frame-dims { color: #666; font-size: 11px; margin-left: 6px; }
    .design-summary { display: flex; align-items: flex-start; gap: 8px; padding: 8px; background: #f5f5f5; border-radius: 6px; }
    .design-summary div { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: #666; }
    .design-summary strong { font-size: 12px; color: #1a1a1a; }

    /* ── Slice Preview ───────────────────────────────────── */
    .slice-preview { display: flex; flex-direction: column; gap: 8px; }
    .preview-header { display: flex; justify-content: space-between; font-size: 11px; color: #666; }
    .preview-canvas { border-radius: 4px; }
    .preview-actions { display: flex; gap: 6px; }
    .preview-actions button { flex: 1; padding: 5px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 3px; }
    .preview-actions button:hover { background: #e5e5e5; }

    /* ── Compression Results ─────────────────────────────── */
    .compression-results { display: flex; flex-direction: column; gap: 8px; }
    .targets-box { background: #f0f8ff; border: 1px solid #b3d9ff; padding: 6px 8px; border-radius: 4px; font-size: 11px; display: flex; flex-direction: column; gap: 2px; }
    .results-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .results-table th { background: #f5f5f5; padding: 4px 6px; text-align: left; border-bottom: 1px solid #e5e5e5; }
    .results-table td { padding: 3px 6px; border-bottom: 1px solid #f0f0f0; }
    .results-table .totals-row { font-weight: 600; background: #f9f9f9; }
    .results-table .status-optimal td:last-child { color: #22a06b; }
    .results-table .status-good td:last-child { color: #4cad6e; }
    .results-table .status-warning td:last-child { color: #e6820a; }
    .results-table .status-failed td:last-child { color: #cc0000; }
    .recommendation { background: #fff8e0; border: 1px solid #ffe58f; padding: 6px 8px; border-radius: 4px; font-size: 11px; }

    /* ── Tech Mode ───────────────────────────────────────── */
    .login-panel { align-items: center; text-align: center; padding: 32px 16px; gap: 12px; }
    .login-icon { font-size: 36px; }
    .user-bar { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: #f5f5f5; border-radius: 6px; font-size: 11px; }
    .user-bar span { flex: 1; }
    .section-title { font-weight: 700; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }

    /* ── Slice Config Table ──────────────────────────────── */
    .slice-config-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .slice-config-table th { background: #f5f5f5; padding: 4px 4px; text-align: left; border-bottom: 1px solid #e5e5e5; }
    .slice-config-table td { padding: 3px 4px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .slice-config-table input { width: 100%; border: 1px solid #ddd; border-radius: 3px; padding: 2px 4px; }
    .slice-config-table input:focus { outline: none; border-color: #0099ff; }

    /* ── Klaviyo Config ──────────────────────────────────── */
    .klaviyo-config { display: flex; flex-direction: column; gap: 8px; }
    .mode-selector { display: flex; gap: 12px; font-size: 12px; }
    .mode-selector label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .form-field { display: flex; flex-direction: column; gap: 3px; }
    .form-field label { font-size: 11px; color: #555; font-weight: 600; }
    .form-field input, .form-field select { border: 1px solid #ddd; border-radius: 3px; padding: 5px 7px; }
    .form-field input:focus, .form-field select:focus { outline: none; border-color: #0099ff; }

    /* ── API Key Setup ───────────────────────────────────── */
    .key-setup-header { text-align: center; padding: 8px 0 4px; }
    .key-icon { font-size: 28px; margin-bottom: 6px; }
    .key-setup-header p { color: #555; font-size: 12px; line-height: 1.4; }
    .key-hint { font-size: 11px; color: #888; margin-top: -4px; }
    .field-error { color: #cc0000; font-size: 11px; margin-top: 2px; }
    .identity-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: #f5f5f5; border-radius: 6px; font-size: 11px; }
    .key-indicator { display: flex; align-items: center; gap: 6px; }
    .key-masked { color: #888; font-family: monospace; font-size: 11px; }

    /* ── Slice hint ──────────────────────────────────────── */
    .slice-hint { font-size: 10px; color: #999; line-height: 1.4; margin-top: -2px; }

    /* ── Frame Picker ────────────────────────────────────── */
    .frame-picker { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 0 8px; border-bottom: 1px solid #e5e5e5; margin-bottom: 8px; }
    .frame-pill { padding: 3px 8px; border-radius: 12px; border: 1px solid #ddd; background: #f5f5f5; color: #333; font-size: 11px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .frame-pill.active { background: #0099ff; color: #fff; border-color: #0099ff; }
    .frame-pill.done { border-color: #22a06b; color: #22a06b; }
    .frame-pill.active.done { background: #22a06b; border-color: #22a06b; color: #fff; }

    /* ── HTML Preview ────────────────────────────────────── */
    .html-preview { border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
    .html-preview .preview-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: #f5f5f5; border-bottom: 1px solid #ddd; font-size: 11px; font-weight: 600; }

    /* ── Frame Checklist ─────────────────────────────────── */
    .frame-checklist { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
    .checklist-header { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #666; padding: 4px 0 6px; }
    .checklist-header button { font-size: 10px; padding: 2px 6px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 3px; margin-left: 4px; }
    .checklist-header button:hover { background: #e5e5e5; }
    .frame-check-item { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; border: 1px solid transparent; user-select: none; }
    .frame-check-item:hover { background: #f5f5f5; }
    .frame-check-item.checked { background: #f0f8ff; border-color: #b3d9ff; }
    .frame-check-item.active-frame { outline: 2px solid #0099ff; outline-offset: -1px; }
    .frame-check-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .frame-check-dims { color: #999; font-size: 10px; white-space: nowrap; }
    .frame-check-done { color: #22a06b; font-weight: 700; font-size: 11px; }
    .frame-check-badge { font-size: 9px; background: #00cc66; color: #fff; padding: 1px 4px; border-radius: 3px; white-space: nowrap; }
    .frame-check-spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #e5e5e5; border-top-color: #0099ff; border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* ── Batch Progress ──────────────────────────────────── */
    .batch-progress { position: relative; background: #e5e5e5; border-radius: 4px; height: 22px; overflow: hidden; margin-bottom: 8px; }
    .batch-bar { position: absolute; left: 0; top: 0; height: 100%; background: #0099ff; transition: width 0.3s ease; }
    .batch-progress span { position: relative; z-index: 1; font-size: 10px; color: #333; padding: 0 8px; line-height: 22px; display: block; }
  </style>
</head>
